name: "On Push"

on:
  pull_request:
    types: [opened, reopened]
    branches:
      - 'ci/openapi'

env:
  CARGO_TERM_COLOR: always
  # The PR title we expect from the other CI job.
  PR_TITLE: "[Autogenerated] Update OpenAPI Spec"

jobs:
  # Do not change this job's name without also changing "pr-ready"'s
  # job name in "on-merge.yml". These jobs must have the same name.
  # See the README for more details.
  pr-ready:
    if: always()
    name: "⚡ PR Ready"
    runs-on: ubuntu-22.04
    needs:
    - "build"
    - "automerge"
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')  || contains(needs.*.result, 'skipped') }}
        run: |
          echo "One or more dependent jobs failed, was skipped, or was cancelled. All jobs must pass for the PR to be ready."
          exit 1
      - run: echo "OK"
  # This job installs Cargo Make and Cargo Nextest before running
  # the CI workflow using Cargo Make. Most of the time, it should
  # restore Cargo Make and other dependencies from cache.
  build:
    name: Validate Rust Build
    uses: "wack/gh-actions/.github/workflows/validate.yml@trunk"
    permissions:
      id-token: "write"
      contents: "read"
      attestations: "write"

  # If the build is successful, then we can attempt to automerge
  # if this PR is generated from CI.
  # Automerge enables automatically enqueueing this PR into the merge
  # queue but only if it passes the required status checks still.
  automerge:
    name: Validate Automerge
    runs-on: ubuntu-22.04
    steps:
      - name: "Automerge" 
        run: Checking if we can enable automerge for this PR.
      - run: |
          echo 'GH sender is ${{ github.event.sender }}'
          echo 'PR title is ${{ github.event.pull_request.title }}'
      - name: "Automerge" 
        if: ${{ github.event.sender == 'RobbieMcKinstry' && github.event.pull_request.title == env.PR_TITLE }}
        run: gh pr merge